<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b0b0d" />
    <title>position comps · swipe</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23ff0060'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --pink: #ff0060;
        --orange: #ffa405;
        --yellow: #ffe400;
        --green: #11ff05;
        --cyan: #05d3ff;
        --purple: #6f05ff;
        --magenta: #f605ff;
        --bg: #0b0b0d;
        --card: #131316;
        --line: #232329;
        --dim: #8b8b95;
        --curve: cubic-bezier(0.765, 0, 0.106, 1); /* adam's curve */
        --spring: cubic-bezier(0.2, 1.45, 0.3, 1);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
      }
      html,
      body {
        height: 100%;
        overscroll-behavior: none;
      }
      body {
        background: var(--bg);
        color: #ececf1;
        overflow: hidden;
        font:
          15px/1.45 "Helvetica Neue",
          -apple-system,
          Helvetica,
          sans-serif;
        display: flex;
        flex-direction: column;
        letter-spacing: -0.01em;
      }

      #bar {
        height: 3px;
        background: #1a1a1f;
        position: relative;
      }
      kbd {
        background: #1e1e24;
        border: 1px solid #333;
        border-radius: 5px;
        padding: 1px 6px;
        font: 11px inherit;
        color: #ccc;
      }
      #barfill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--pink),
          var(--orange),
          var(--yellow),
          var(--green),
          var(--cyan),
          var(--purple),
          var(--magenta)
        );
        transition: width 0.5s var(--curve);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 6px;
      }
      header h1 {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      #prog {
        color: var(--dim);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      header .hbtns {
        display: flex;
        gap: 8px;
      }
      header button,
      header a {
        background: none;
        border: 1px solid var(--line);
        color: var(--dim);
        border-radius: 99px;
        padding: 5px 12px;
        font-size: 12px;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.15s var(--spring),
          color 0.15s;
      }
      header button:active {
        transform: scale(0.92);
        color: #fff;
      }

      #stage {
        flex: 1;
        position: relative;
        margin: 10px 14px 4px;
      }
      .card {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 100%;
        max-width: 560px;
        max-height: 100%;
        height: fit-content;
        background: var(--card);
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid var(--line);
        box-shadow: 0 18px 60px #000c;
        touch-action: none;
        will-change: transform;
      }
      .card.under {
        transform: scale(0.94) translateY(14px);
        opacity: 0.55;
        pointer-events: none;
        transition:
          transform 0.45s var(--curve),
          opacity 0.45s;
      }
      .card.under.rise {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
      .card video {
        width: 100%;
        aspect-ratio: 16/9;
        display: block;
        background: #000;
        pointer-events: none;
      }
      .card .livenote {
        width: 100%;
        margin-top: 10px;
        background: #0b0b0d;
        color: #eee;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 8px 10px;
        font: 13px inherit;
        resize: none;
        height: 46px;
      }
      .card .livenote:focus {
        height: 72px;
        outline: 1px solid var(--cyan);
      }
      .card .body {
        padding: 13px 16px 16px;
      }
      .card h2 {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 4px;
        text-transform: lowercase;
      }
      .card p {
        color: var(--dim);
        font-size: 13px;
        min-height: 38px;
      }

      .stamp {
        position: absolute;
        top: 18px;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.04em;
        padding: 6px 14px;
        border: 3px solid;
        border-radius: 10px;
        opacity: 0;
        transform: rotate(-12deg);
        pointer-events: none;
        text-transform: uppercase;
      }
      .stamp.love {
        left: 16px;
        color: var(--green);
        border-color: var(--green);
      }
      .stamp.nope {
        right: 16px;
        color: var(--pink);
        border-color: var(--pink);
        transform: rotate(12deg);
      }
      .stamp.flag {
        left: 50%;
        top: auto;
        bottom: 18px;
        transform: translateX(-50%) rotate(0deg);
        color: var(--cyan);
        border-color: var(--cyan);
        font-size: 20px;
      }

      #hint {
        text-align: center;
        color: #55555e;
        font-size: 11.5px;
        padding: 2px 0 4px;
      }
      #hint b {
        color: #77777f;
        font-weight: 600;
      }

      #btns {
        display: flex;
        gap: 16px;
        justify-content: center;
        align-items: center;
        padding: 8px 0 max(20px, env(safe-area-inset-bottom));
      }
      #btns button {
        border: none;
        border-radius: 50%;
        cursor: pointer;
        background: var(--card);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s var(--spring);
        box-shadow: 0 4px 18px #0009;
      }
      #btns button:active {
        transform: scale(0.85);
      }
      #bNope {
        width: 62px;
        height: 62px;
        font-size: 24px;
        color: var(--pink);
        border: 2px solid var(--pink);
      }
      #bUndo {
        width: 46px;
        height: 46px;
        font-size: 16px;
        color: var(--yellow);
        border: 1px solid #3a3a42;
      }
      #bFlag {
        width: 46px;
        height: 46px;
        font-size: 17px;
        color: var(--cyan);
        border: 1px solid var(--cyan);
      }
      #bLove {
        width: 62px;
        height: 62px;
        font-size: 24px;
        color: var(--green);
        border: 2px solid var(--green);
      }

      /* ------- params panel ------- */
      #panel {
        position: fixed;
        z-index: 40;
        background: #101013;
        border: 1px solid var(--line);
        overflow-y: auto;
        transition: transform 0.4s var(--curve);
        padding: 16px 16px 22px;
      }
      @media (min-width: 1100px) {
        #panel {
          top: 60px;
          right: 14px;
          bottom: 14px;
          width: 280px;
          border-radius: 16px;
          transform: translateX(120%);
        }
        body.panel-open #panel { transform: translateX(0); }
      }
      @media (max-width: 1099px) {
        #panel {
          left: 0; right: 0; bottom: 0;
          max-height: 55dvh;
          border-radius: 18px 18px 0 0;
          transform: translateY(110%);
          padding-bottom: max(22px, env(safe-area-inset-bottom));
        }
        body.panel-open #panel { transform: translateY(0); }
      }
      #panel h3 {
        font-size: 13px;
        text-transform: lowercase;
        letter-spacing: -0.02em;
        margin-bottom: 2px;
      }
      #panel .livebadge {
        font-size: 10.5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      #panel .livebadge.on { color: var(--green); }
      #panel .livebadge.off { color: var(--dim); }
      #panel .ctl { margin-bottom: 13px; }
      #panel .ctl label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--dim);
        margin-bottom: 5px;
      }
      #panel .ctl label b { color: #ddd; font-weight: 600; }
      #panel input[type="range"] { width: 100%; accent-color: var(--cyan); }
      #panel select, #panel input[type="text"] {
        width: 100%;
        background: #0b0b0d;
        color: #eee;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 9px;
        font: 13px inherit;
      }
      #panel .tgl {
        width: 44px; height: 26px; border-radius: 99px;
        background: #26262c; border: none; position: relative; cursor: pointer;
        transition: background 0.2s;
      }
      #panel .tgl.on { background: var(--green); }
      #panel .tgl::after {
        content: ""; position: absolute; top: 3px; left: 3px;
        width: 20px; height: 20px; border-radius: 50%; background: #fff;
        transition: transform 0.2s var(--spring);
      }
      #panel .tgl.on::after { transform: translateX(18px); }
      #panel .pstatus { font-size: 11.5px; color: var(--dim); min-height: 16px; margin: 4px 0 8px; }
      #panel .pstatus.err { color: var(--pink); }
      #panel .prow { display: flex; gap: 8px; margin-top: 10px; }
      #panel .prow button {
        flex: 1; background: #1b1b20; color: #ccc; border: 1px solid var(--line);
        border-radius: 9px; padding: 9px; font-size: 12.5px; cursor: pointer;
      }
      #panel .noknobs { color: var(--dim); font-size: 12.5px; line-height: 1.5; }

      /* ------- summary ------- */
      #done {
        display: none;
        flex: 1;
        overflow: auto;
        padding: 8px 18px 40px;
      }
      #done h2 {
        font-size: 20px;
        letter-spacing: -0.03em;
        margin: 14px 0 4px;
        text-transform: lowercase;
      }
      #done .sub {
        color: var(--dim);
        font-size: 13px;
        margin-bottom: 18px;
      }
      .group {
        margin-bottom: 22px;
      }
      .group h3 {
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 8px;
      }
      .group h3.love {
        color: var(--green);
      }
      .group h3.flag {
        color: var(--cyan);
      }
      .group h3.nope {
        color: var(--pink);
      }
      .item {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px 12px;
        margin-bottom: 8px;
      }
      .item .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .item .name {
        font-size: 14px;
        font-weight: 600;
      }
      .item video {
        width: 100%;
        border-radius: 8px;
        margin-top: 8px;
        aspect-ratio: 16/9;
        background: #000;
      }
      .item textarea {
        width: 100%;
        margin-top: 8px;
        background: #0b0b0d;
        color: #eee;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 9px 10px;
        font: 13px inherit;
        resize: none;
        min-height: 52px;
      }
      .item .re {
        background: none;
        border: none;
        color: var(--dim);
        font-size: 12px;
        cursor: pointer;
        padding: 4px;
      }
      #copy {
        position: sticky;
        bottom: 12px;
        display: block;
        width: 100%;
        background: var(--green);
        color: #000;
        border: none;
        border-radius: 14px;
        padding: 15px;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
        transition: transform 0.2s var(--spring);
        box-shadow: 0 6px 24px #000c;
      }
      #copy:active {
        transform: scale(0.97);
      }
      #reset {
        background: none;
        border: none;
        color: #55555e;
        margin: 14px auto 0;
        display: block;
        font-size: 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="bar"><div id="barfill"></div></div>
    <header>
      <h1>position comps</h1>
      <span id="prog"></span>
      <div class="hbtns">
        <button id="undo" title="undo last swipe (⌘Z)">↩ back</button
        ><button id="keys" title="shortcuts (?)">?</button
        ><a href="index.html">lab</a>
      </div>
    </header>
    <div
      id="cheat"
      style="
        display: none;
        position: fixed;
        inset: 0;
        z-index: 50;
        background: #000c;
        backdrop-filter: blur(6px);
      "
    >
      <div
        style="
          max-width: 340px;
          margin: 18vh auto 0;
          background: var(--card);
          border: 1px solid var(--line);
          border-radius: 16px;
          padding: 18px 20px;
        "
      >
        <h2 style="font-size: 15px; margin-bottom: 12px">shortcuts</h2>
        <table
          style="
            width: 100%;
            font-size: 13px;
            color: var(--dim);
            border-spacing: 0 7px;
          "
        >
          <tr>
            <td><kbd>→</kbd> / swipe right</td>
            <td>love</td>
          </tr>
          <tr>
            <td><kbd>←</kbd> / swipe left</td>
            <td>nope</td>
          </tr>
          <tr>
            <td><kbd>↓</kbd> / swipe down</td>
            <td>flag — notes later</td>
          </tr>
          <tr>
            <td><kbd>⌘Z</kbd> <kbd>u</kbd> <kbd>⌫</kbd></td>
            <td>undo</td>
          </tr>
          <tr>
            <td><kbd>?</kbd></td>
            <td>this sheet</td>
          </tr>
          <tr>
            <td><kbd>esc</kbd></td>
            <td>close</td>
          </tr>
        </table>
      </div>
    </div>
    <div id="stage"></div>
    <div id="hint">
      <b>→</b> love &nbsp;·&nbsp; <b>←</b> nope &nbsp;·&nbsp; <b>↓</b> good,
      notes later
    </div>
    <div id="btns">
      <button id="bNope" title="nope (←)">✕</button>
      <button id="bUndo" title="undo (⌘Z)">↩</button>
      <button id="bFlag" title="good — notes later (↓)">▾</button>
      <button id="bGear" title="params / debug panel (p)" style="width:46px;height:46px;font-size:17px;color:var(--orange);border:1px solid var(--orange);border-radius:50%;background:var(--card);cursor:pointer">⚙</button>
      <button id="bLove" title="love (→)">❤</button>
    </div>
    <aside id="panel"></aside>
    <section id="done"></section>

    <script>
      const KEY = "fadi-comps-feedback-v2";
      const PKEY = "fadi-comps-params";
      const pvals = JSON.parse(localStorage.getItem(PKEY) || "{}");
      let SCHEMAS = {}, LIVE = false, curBase = "fx2";
      const ID2COMP = {
        "mood-grid-reveal": "mood_grid", "fadi-grid": "fadi_grid",
        "silhouette-window": "silhouette_window", "spotlight": "spotlight",
        "frame-trails": "frame_trails", "pixel-me": "pixel_me",
        "duotone-split": "duotone_split", "glitch-column": "glitch_column",
        "type-orbit": "type_orbit", "venetian-mood": "venetian",
        "band-rainbow-graffiti": "band_behind", "band-rainbow-street": "band_behind",
        "band-solid-squares": "band_behind", "beam-vertical-street": "beam_vertical",
        "big-word-graffiti": "big_word_behind", "word-stack-squares": "word_stack_wall",
        "negative-fill-street": "negative_fill", "split-invert-squares": "split_invert",
        "echo-row-squares": "echo_row", "echo-row-graffiti": "echo_row",
        "halo-rings-street": "halo_rings", "frame-inset-street": "frame_inset",
        "cutout-shadow-graffiti": "cutout_shadow", "cutout-shadow-squares": "cutout_shadow",
        "mondrian-squares": "mondrian", "ground-reflection-street": "ground_reflection",
      };
      const compOf = (id) => ID2COMP[id] || id.replace(/-/g, "_");
      fetch("params.json").then(r => r.json()).then(s => { SCHEMAS = s; });
      fetch("/api/ping").then(r => r.json()).then(j => { LIVE = !!j.live; })
        .catch(() => { LIVE = false; });
      const DKEY = "fadi-comps-drafts";
      const drafts = JSON.parse(localStorage.getItem(DKEY) || "{}");
      const OLD = JSON.parse(
        localStorage.getItem("fadi-comps-feedback-v1") || "{}",
      );
      let items = [],
        idx = 0,
        fb = JSON.parse(localStorage.getItem(KEY) || "null") || migrate();

      function migrate() {
        // carry v1 votes forward (love/nope/meh -> flag)
        const m = {};
        for (const [id, f] of Object.entries(OLD))
          m[id] = { v: f.v === "meh" ? "flag" : f.v, note: f.note || "" };
        return m;
      }
      function save() {
        localStorage.setItem(KEY, JSON.stringify(fb));
      }

      const stage = document.getElementById("stage"),
        prog = document.getElementById("prog"),
        bar = document.getElementById("barfill"),
        done = document.getElementById("done");

      function el(tag, cls, text) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text !== undefined) e.textContent = text;
        return e;
      }

      fetch("comps-catalog.json?v=" + Date.now())
        .then((r) => r.json())
        .then((c) => {
          items = c.items;
          idx = items.findIndex((it) => !(it.id in fb));
          if (idx < 0) idx = items.length;
          render();
        });

      function makeCard(it) {
        const card = el("div", "card");
        const v = el("video");
        v.src = it.media;
        v.autoplay = v.loop = v.muted = true;
        v.playsInline = true;
        v.setAttribute("playsinline", "");
        v.preload = "auto";
        const body = el("div", "body");
        body.append(el("h2", null, it.label), el("p", null, it.meta));
        const ta = el("textarea", "livenote");
        ta.placeholder = "type notes live — saved with your swipe";
        ta.value = drafts[it.id] || (fb[it.id] && fb[it.id].note) || "";
        ta.oninput = () => {
          drafts[it.id] = ta.value;
          localStorage.setItem(DKEY, JSON.stringify(drafts));
        };
        body.append(ta);
        card.append(
          v,
          body,
          el("div", "stamp love", "love"),
          el("div", "stamp nope", "nope"),
          el("div", "stamp flag", "notes later"),
        );
        return card;
      }

      let pTimer = null;
      function panelFor(it) {
        const panel = document.getElementById("panel");
        panel.replaceChildren();
        const comp = compOf(it.id);
        const schema = SCHEMAS[comp];
        panel.append(el("h3", null, it.label));
        const badge = el("div", "livebadge " + (LIVE ? "on" : "off"),
          LIVE ? "● live — changes re-render the preview"
               : "○ annotate-only — values save with your swipe (run ./server.py for live)");
        panel.append(badge);
        const status = el("div", "pstatus", "");
        const vals = pvals[it.id] = pvals[it.id] || {};
        const persist = () => localStorage.setItem(PKEY, JSON.stringify(pvals));
        const rerender = () => {
          if (!LIVE) return;
          clearTimeout(pTimer);
          pTimer = setTimeout(async () => {
            status.className = "pstatus"; status.textContent = "rendering…";
            try {
              const r = await fetch("/api/preview", { method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ comp, sd: vals, base: curBase }) });
              const j = await r.json();
              if (j.url) {
                const vid = stage.querySelector(".card:not(.under) video");
                if (vid) { vid.src = j.url + "?t=" + Date.now(); vid.play(); }
                status.textContent = "✓ live";
              } else { status.className = "pstatus err"; status.textContent = j.error || "render failed"; }
            } catch (e) { status.className = "pstatus err"; status.textContent = "server unreachable"; }
          }, 450);
        };
        if (LIVE) {
          const bc = el("div", "ctl");
          const bl = el("label"); bl.append(el("span", null, "footage"), el("b", null, ""));
          const sel = el("select");
          for (const b of (SCHEMAS._bases || [])) {
            const o = el("option", null, b.label); o.value = b.id; sel.append(o);
          }
          sel.value = curBase;
          sel.onchange = () => { curBase = sel.value; rerender(); };
          bc.append(bl, sel); panel.append(bc);
        }
        if (!schema) {
          panel.append(el("div", "noknobs",
            "no exposed knobs for this one yet — type in the note what you'd want tweakable and i'll wire it."));
          panel.append(status);
          return;
        }
        for (const p of schema) {
          const ctl = el("div", "ctl");
          const lab = el("label");
          const valEl = el("b", null, "");
          lab.append(el("span", null, p.label), valEl);
          ctl.append(lab);
          const cur = vals[p.key] !== undefined ? vals[p.key] : p.default;
          const show = (v) => valEl.textContent =
            typeof v === "boolean" ? (v ? "on" : "off") : String(v);
          show(cur);
          if (p.type === "range") {
            const inp = el("input"); inp.type = "range";
            inp.min = p.min; inp.max = p.max; inp.step = p.step; inp.value = cur;
            inp.oninput = () => { vals[p.key] = parseFloat(inp.value); show(vals[p.key]); persist(); rerender(); };
            ctl.append(inp);
          } else if (p.type === "toggle") {
            const b = el("button", "tgl" + (cur ? " on" : ""));
            b.onclick = () => { vals[p.key] = !(vals[p.key] !== undefined ? vals[p.key] : p.default);
              b.classList.toggle("on", vals[p.key]); show(vals[p.key]); persist(); rerender(); };
            ctl.append(b);
          } else if (p.type === "select") {
            const sel = el("select");
            for (const o of p.options) { const op = el("option", null, o); op.value = o; sel.append(op); }
            sel.value = cur;
            sel.onchange = () => { vals[p.key] = sel.value; show(sel.value); persist(); rerender(); };
            ctl.append(sel);
          } else if (p.type === "text") {
            const inp = el("input"); inp.type = "text"; inp.value = cur;
            inp.oninput = () => { vals[p.key] = inp.value; persist(); rerender(); };
            ctl.append(inp);
          }
          panel.append(ctl);
        }
        panel.append(status);
        const prow = el("div", "prow");
        const reset = el("button", null, "reset");
        reset.onclick = () => { pvals[it.id] = {}; persist(); panelFor(it); rerender(); };
        prow.append(reset);
        if (LIVE) {
          const rr = el("button", null, "re-render");
          rr.onclick = rerender;
          prow.append(rr);
        }
        panel.append(prow);
      }
      document.getElementById("bGear").onclick = () =>
        document.body.classList.toggle("panel-open");

      function render() {
        stage.replaceChildren();
        const total = items.length;
        bar.style.width = (100 * Math.min(idx, total)) / total + "%";
        if (idx >= total) return finish();
        document.getElementById("btns").style.display = "flex";
        document.getElementById("hint").style.display = "block";
        done.style.display = "none";
        prog.textContent = idx + 1 + " / " + total;

        if (items[idx + 1]) {
          // under-card peek
          const under = makeCard(items[idx + 1]);
          under.classList.add("under");
          stage.append(under);
        }
        const card = makeCard(items[idx]);
        stage.append(card);
        attachDrag(card);
        panelFor(items[idx]);
      }

      /* ---------------- drag physics ---------------- */
      function attachDrag(card) {
        let x0 = 0,
          y0 = 0,
          dx = 0,
          dy = 0,
          dragging = false,
          t0 = 0;
        const stamps = {
          love: card.querySelector(".stamp.love"),
          nope: card.querySelector(".stamp.nope"),
          flag: card.querySelector(".stamp.flag"),
        };
        const down = (e) => {
          if (e.target && e.target.tagName === "TEXTAREA") return;
          dragging = true;
          t0 = performance.now();
          x0 = e.clientX;
          y0 = e.clientY;
          card.style.transition = "none";
          card.setPointerCapture && card.setPointerCapture(e.pointerId);
        };
        const move = (e) => {
          if (!dragging) return;
          dx = e.clientX - x0;
          dy = e.clientY - y0;
          card.style.transform = `translate(${dx}px, ${dy * 0.6}px) rotate(${dx * 0.045}deg)`;
          stamps.love.style.opacity = Math.min(1, Math.max(0, dx - 24) / 90);
          stamps.nope.style.opacity = Math.min(1, Math.max(0, -dx - 24) / 90);
          stamps.flag.style.opacity =
            Math.min(1, Math.max(0, dy - 30) / 90) *
            (Math.abs(dx) < 70 ? 1 : 0);
        };
        const up = (e) => {
          if (!dragging) return;
          dragging = false;
          const vel = Math.abs(dx) / Math.max(1, performance.now() - t0);
          const flingX = Math.abs(dx) > 100 || (Math.abs(dx) > 40 && vel > 0.5);
          const flingY = dy > 90 && Math.abs(dx) < 70;
          if (flingY) fly(card, "flag");
          else if (flingX) fly(card, dx > 0 ? "love" : "nope");
          else {
            // spring back
            card.style.transition = "transform .5s var(--spring)";
            card.style.transform = "";
            Object.values(stamps).forEach((s) => (s.style.opacity = 0));
          }
        };
        card.addEventListener("pointerdown", down);
        card.addEventListener("pointermove", move);
        card.addEventListener("pointerup", up);
        card.addEventListener("pointercancel", up);
      }

      function fly(card, v) {
        const it = items[idx];
        const lta = card.querySelector ? card.querySelector(".livenote") : null;
        const note = (lta && lta.value.trim()) || drafts[it.id] ||
                     (fb[it.id] && fb[it.id].note) || "";
        fb[it.id] = { v, note };
        if (pvals[it.id] && Object.keys(pvals[it.id]).length)
          fb[it.id].params = pvals[it.id];
        save();
        if (navigator.vibrate) navigator.vibrate(v === "nope" ? 18 : 10);
        card.style.transition = "transform .45s var(--curve), opacity .4s";
        card.style.transform =
          v === "flag"
            ? "translateY(120vh) rotate(4deg)"
            : v === "love"
              ? "translate(120vw, -8vh) rotate(16deg)"
              : "translate(-120vw, -8vh) rotate(-16deg)";
        card.style.opacity = "0";
        const under = stage.querySelector(".card.under");
        if (under) under.classList.add("rise");
        setTimeout(() => {
          idx++;
          render();
        }, 240);
      }

      function voteBtn(v) {
        const card = stage.querySelector(".card:not(.under)");
        if (card) fly(card, v);
      }
      document.getElementById("bLove").onclick = () => voteBtn("love");
      document.getElementById("bNope").onclick = () => voteBtn("nope");
      document.getElementById("bFlag").onclick = () => voteBtn("flag");
      document.getElementById("bUndo").onclick = undo;
      document.getElementById("undo").onclick = undo;
      function undo() {
        if (idx <= 0) return;
        idx--;
        delete fb[items[idx].id];
        save();
        render();
      }
      const cheat = document.getElementById("cheat");
      const cheatToggle = (show) =>
        (cheat.style.display = show ? "block" : "none");
      cheat.onclick = () => cheatToggle(false);
      document.getElementById("keys").onclick = () => cheatToggle(true);
      addEventListener("keydown", (e) => {
        const t = e.target;
        if (t && (t.tagName === "TEXTAREA" || t.tagName === "INPUT")) return;
        if (e.key === "Escape") return cheatToggle(false);
        if (e.key === "?") return cheatToggle(cheat.style.display === "none");
        if (e.key === "p") return document.body.classList.toggle("panel-open");
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z") {
          e.preventDefault();
          return undo();
        }
        if (e.key === "ArrowRight") voteBtn("love");
        if (e.key === "ArrowLeft") voteBtn("nope");
        if (e.key === "ArrowDown") voteBtn("flag");
        if (e.key === "u" || e.key === "Backspace") undo();
      });

      /* ---------------- summary ---------------- */
      function finish() {
        document.getElementById("btns").style.display = "none";
        document.getElementById("hint").style.display = "none";
        stage.style.display = "none";
        done.style.display = "block";
        prog.textContent = items.length + " / " + items.length;
        done.replaceChildren();
        done.append(el("h2", null, "done."));
        const flagged = items.filter(
          (it) => fb[it.id] && fb[it.id].v === "flag",
        );
        done.append(
          el(
            "div",
            "sub",
            flagged.length
              ? "add notes to the flagged ones whenever — everything autosaves."
              : "everything saved. copy it over to claude below.",
          ),
        );

        const groups = [
          ["love", "loved ❤"],
          ["flag", "flagged — notes ▾"],
          ["nope", "noped ✕"],
        ];
        for (const [key, title] of groups) {
          const list = items.filter((it) => fb[it.id] && fb[it.id].v === key);
          if (!list.length) continue;
          const g = el("div", "group");
          g.append(el("h3", key, title + " · " + list.length));
          for (const it of list) {
            const item = el("div", "item");
            const row = el("div", "row");
            row.append(el("span", "name", it.label));
            const re = el("button", "re", "re-vote");
            re.onclick = () => {
              delete fb[it.id];
              save();
              idx = items.findIndex((x) => x.id === it.id);
              stage.style.display = "";
              render();
            };
            row.append(re);
            item.append(row);
            if (key === "flag") {
              const vid = el("video");
              vid.src = it.media;
              vid.loop = vid.muted = true;
              vid.playsInline = true;
              vid.setAttribute("playsinline", "");
              vid.preload = "metadata";
              vid.onclick = () => (vid.paused ? vid.play() : vid.pause());
              item.append(vid);
              const ta = el("textarea");
              ta.placeholder =
                "what should change — sizing, color, timing, feel…";
              ta.value = fb[it.id].note || "";
              ta.oninput = () => {
                fb[it.id].note = ta.value;
                save();
              };
              item.append(ta);
            }
            g.append(item);
          }
          done.append(g);
        }
        const copy = el("button", null, "copy feedback for claude");
        copy.id = "copy";
        copy.onclick = async () => {
          const out = {
            when: new Date().toISOString(),
            deck: "position-comps-v2",
            feedback: items.map((it) => ({
              id: it.id,
              ...(fb[it.id] || { v: "skipped" }),
            })),
          };
          const txt = "FADI COMP FEEDBACK\n" + JSON.stringify(out, null, 1);
          try {
            await navigator.clipboard.writeText(txt);
            copy.textContent = "copied — paste it to claude";
          } catch (e) {
            prompt("copy this:", txt);
          }
        };
        done.append(copy);
        const reset = el("button", null, "start over");
        reset.id = "reset";
        reset.onclick = () => {
          fb = {};
          save();
          idx = 0;
          stage.style.display = "";
          render();
        };
        done.append(reset);
      }
    </script>
  </body>
</html>
