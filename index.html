<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fadi Animation Review</title>
<style>
  :root{ --bg:#0b0b0f; --card:#15151c; --line:#26262f; --txt:#f2f2f5; --dim:#8a8a96;
    --pink:#ff0060; --orange:#ffa405; --yellow:#ffe400; --green:#11ff05; --cyan:#05d3ff; --purple:#6f05ff; --magenta:#f605ff; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 -apple-system,Helvetica Neue,Arial,sans-serif}
  header{position:sticky;top:0;z-index:10;background:rgba(11,11,15,.93);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:16px;margin:0;letter-spacing:.4px}
  h1 b{background:linear-gradient(90deg,var(--pink),var(--orange),var(--yellow),var(--green),var(--cyan),var(--purple),var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat{color:var(--dim);font-size:12.5px}
  .controls{display:flex;gap:7px;align-items:center;margin-left:auto;flex-wrap:wrap}
  select,input[type=text],button{background:#1c1c24;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 10px;font:inherit;cursor:pointer}
  button.toggle.active{background:#2a2a36;border-color:#454556}
  button.accent{background:#23232c}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;position:relative}
  .card.rated{border-color:#3a3a46}.card.trashed{opacity:.5}
  .media{position:relative;background:#000;aspect-ratio:16/9}
  .media video,.media img{width:100%;height:100%;display:block;object-fit:contain;background:#141414}
  .num{position:absolute;top:6px;left:8px;font-size:11px;color:var(--dim);background:rgba(0,0,0,.45);padding:1px 6px;border-radius:6px}
  .trash{position:absolute;top:6px;right:8px;border:none;background:rgba(0,0,0,.5);padding:3px 7px;border-radius:7px;font-size:14px;line-height:1}
  .trash:hover{background:var(--pink)}
  .body{padding:9px 12px 11px;display:flex;flex-direction:column;gap:7px}
  .name{font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .cat{color:var(--dim);font-size:11px;font-weight:400;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  .stars{display:flex;gap:3px;font-size:23px;line-height:1;cursor:pointer;user-select:none}
  .stars span{color:#3a3a46}.stars span.on{color:var(--yellow)}
  textarea{width:100%;min-height:36px;resize:vertical;background:#1c1c24;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 9px;font:inherit}
  textarea::placeholder{color:#5a5a66}
  .meta{font-size:11px;color:#6a6a76;display:none}.card:hover .meta{display:block}
  .saved{font-size:11px;color:var(--green);opacity:0;transition:opacity .2s}.saved.show{opacity:1}
  #focus{display:none;padding:18px;max-width:1100px;margin:0 auto}#focus.on{display:block}
  .fmedia{background:#000;border:1px solid var(--line);border-radius:14px;overflow:hidden;aspect-ratio:16/9}
  .fmedia video,.fmedia img{width:100%;height:100%;object-fit:contain;background:#141414}
  .fbar{display:flex;align-items:center;gap:16px;margin-top:14px;flex-wrap:wrap}
  .fbar .stars{font-size:34px}.fname{font-size:22px;font-weight:700}.fnav{display:flex;gap:8px;margin-left:auto}
  #focus textarea{margin-top:12px;min-height:54px}
  .hint{color:var(--dim);font-size:12px;margin-top:10px}
  kbd{background:#23232c;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:11px}
</style>
</head>
<body>
<header>
  <h1><b id="title">FADI ANIMATION REVIEW</b></h1>
  <span class="stat" id="stat">—</span>
  <div class="controls">
    <button class="toggle active" id="vGrid">Grid</button>
    <button class="toggle" id="vFocus">Focus</button>
    <select id="filter">
      <option value="todo">To review</option><option value="all">All</option>
      <option value="rated">Rated</option><option value="trashed">Trashed</option><option value="commented">Commented</option>
      <option value="5">5★</option><option value="4">4+★</option><option value="3">3+★</option><option value="lt3">&lt;3★</option>
    </select>
    <select id="catf"></select>
    <select id="sort"><option value="num">Order</option><option value="rating">Rating</option><option value="category">Category</option></select>
    <input type="text" id="search" placeholder="search…" />
    <button class="accent" id="export" title="download ratings.json">⬇ Export</button>
    <button class="accent" id="import" title="load a ratings.json">⬆ Import</button>
    <input type="file" id="file" accept="application/json" style="display:none" />
  </div>
</header>

<div class="grid" id="grid"></div>

<div id="focus">
  <div class="fmedia" id="fmedia"></div>
  <div class="fbar">
    <span class="fname" id="fname"></span><span class="cat" id="fcat"></span>
    <div class="stars" id="fstars"></div>
    <button id="fTrash">🗑 Trash</button>
    <div class="fnav"><button id="fPrev">← Prev</button><button id="fNext">Next →</button></div>
  </div>
  <textarea id="fcomment" placeholder="comment / what to change…"></textarea>
  <div class="meta" id="fmeta" style="display:block"></div>
  <div class="hint"><kbd>1</kbd>–<kbd>5</kbd> rate · <kbd>0</kbd> clear · <kbd>T</kbd> trash · <kbd>←</kbd><kbd>→</kbd> nav · auto-advances</div>
</div>

<script>
const KEY='fadi-anim-review-v1';
let TITLE='Fadi Animation Review', ITEMS=[], R={}, view='grid', fIdx=0;
const $=(s)=>document.querySelector(s);
function el(t,p,k){const e=document.createElement(t);if(p)for(const a in p){if(a==='class')e.className=p[a];else if(a==='text')e.textContent=p[a];else e.setAttribute(a,p[a]);}if(k)for(const c of k)e.appendChild(c);return e;}
const isVideo=(it)=>(it.type||'').startsWith('video')||/\.(mp4|webm|mov|m4v)$/i.test(it.media||'');
function media(it){if(isVideo(it)){const v=el('video',{loop:'',autoplay:'',playsinline:''});v.muted=true;v.src=it.media;return v;}const im=el('img');im.src=it.media;return im;}
function persist(){localStorage.setItem(KEY,JSON.stringify(R));}

async function load(){
  const cat=await (await fetch('catalog.json')).json();
  TITLE=cat.title||TITLE; ITEMS=cat.items||cat; ITEMS.forEach((it,i)=>it._i=i);
  $('#title').textContent=TITLE.toUpperCase();
  try{R=JSON.parse(localStorage.getItem(KEY)||'{}');}catch(e){R={};}
  const cats=[...new Set(ITEMS.map(c=>c.category).filter(Boolean))].sort();
  const cf=$('#catf'); cf.appendChild(el('option',{value:'all',text:'All categories'}));
  cats.forEach(c=>cf.appendChild(el('option',{value:c,text:c})));
  render(); updateStat();
}
function save(id,patch){R[id]=Object.assign({stars:0,comment:'',trashed:false},R[id],patch);persist();updateStat();}
function reviewed(it){const r=R[it.id]||{};return (r.stars||0)>0||r.trashed;}
function updateStat(){const rev=ITEMS.filter(reviewed).length,tr=ITEMS.filter(c=>R[c.id]?.trashed).length,com=ITEMS.filter(c=>(R[c.id]?.comment||'').trim()).length;$('#stat').textContent=`${rev}/${ITEMS.length} reviewed · ${tr} trashed · ${com} comments`;}
function passes(it){const r=R[it.id]||{},f=$('#filter').value;if($('#catf').value!=='all'&&it.category!==$('#catf').value)return false;const q=$('#search').value.trim().toLowerCase();if(q&&!((it.label||'').toLowerCase().includes(q)||(it.id||'').includes(q)))return false;const s=r.stars||0;if(f==='todo')return !reviewed(it);if(f==='rated')return s>0;if(f==='trashed')return !!r.trashed;if(f==='commented')return (r.comment||'').trim().length>0;if(f==='all')return true;if(f==='5')return s===5;if(f==='4')return s>=4;if(f==='3')return s>=3;if(f==='lt3')return s>0&&s<3;return true;}
function listed(){let l=ITEMS.filter(passes);const s=$('#sort').value;if(s==='rating')l=[...l].sort((a,b)=>(R[b.id]?.stars||0)-(R[a.id]?.stars||0));if(s==='category')l=[...l].sort((a,b)=>(a.category||'').localeCompare(b.category||''));return l;}
function starsEl(id){const r=R[id]||{};const w=el('div',{class:'stars','data-id':id});for(let s=1;s<=5;s++){const sp=el('span',{'data-s':s,text:'★'});if(s<=(r.stars||0))sp.classList.add('on');w.appendChild(sp);}return w;}
function setStars(w,n){[...w.children].forEach((s,k)=>s.classList.toggle('on',k<n));}
function render(){
  if(view==='focus'){renderFocus();return;}
  $('#grid').replaceChildren(...listed().map(it=>{
    const r=R[it.id]||{stars:0,comment:''};
    const m=el('div',{class:'media'},[media(it),el('span',{class:'num',text:String(it._i+1).padStart(3,'0')})]);
    const tb=el('button',{class:'trash',title:'trash'});tb.textContent=r.trashed?'♻':'🗑';tb.dataset.id=it.id;tb.dataset.act='trash';m.appendChild(tb);
    const ta=el('textarea',{placeholder:'comment / what to change…','data-id':it.id});ta.value=r.comment||'';
    const body=el('div',{class:'body'},[el('div',{class:'name'},[el('span',{text:it.label||it.id}),el('span',{class:'cat',text:it.category||''})]),starsEl(it.id),ta,el('div',{class:'meta',text:it.meta||''}),el('div',{class:'saved',text:'saved ✓'})]);
    return el('div',{class:'card'+(r.stars?' rated':'')+(r.trashed?' trashed':'')},[m,body]);
  }));
}
function flash(n){const s=n&&n.querySelector?n.querySelector('.saved'):null;if(s){s.classList.add('show');setTimeout(()=>s.classList.remove('show'),800);}}
$('#grid').addEventListener('click',e=>{
  const sp=e.target.closest('.stars span');
  if(sp){const w=sp.closest('.stars'),id=w.dataset.id,v=+sp.dataset.s,cur=R[id]?.stars||0,nv=cur===v?0:v;save(id,{stars:nv});setStars(w,nv);const c=w.closest('.card');c.classList.toggle('rated',nv>0);flash(c.querySelector('.body'));if($('#filter').value==='todo')setTimeout(render,250);return;}
  const tb=e.target.closest('[data-act=trash]');
  if(tb){const id=tb.dataset.id,t=!(R[id]?.trashed);save(id,{trashed:t});const f=$('#filter').value;if(f==='todo'||f==='trashed')setTimeout(render,150);else{tb.textContent=t?'♻':'🗑';tb.closest('.card').classList.toggle('trashed',t);}return;}
});
let timers={};
$('#grid').addEventListener('input',e=>{const ta=e.target.closest('textarea');if(!ta)return;const id=ta.dataset.id;clearTimeout(timers[id]);timers[id]=setTimeout(()=>{save(id,{comment:ta.value});flash(ta.closest('.body'));},500);});
// focus
function focusList(){return ITEMS.filter(passes);}
function renderFocus(){const l=focusList();if(!l.length){$('#fmedia').replaceChildren(el('div',{class:'hint',text:'Nothing here — change the filter.'}));$('#fname').textContent='';$('#fstars').replaceChildren();$('#fcomment').value='';$('#fmeta').textContent='';return;}if(fIdx>=l.length)fIdx=l.length-1;if(fIdx<0)fIdx=0;const it=l[fIdx],r=R[it.id]||{};$('#fmedia').replaceChildren(media(it));$('#fname').textContent=`${String(it._i+1).padStart(3,'0')} · ${it.label||it.id}`;$('#fcat').textContent=it.category||'';const fs=starsEl(it.id);fs.id='fstars';$('#fstars').replaceWith(fs);$('#fcomment').value=r.comment||'';$('#fcomment').dataset.id=it.id;$('#fmeta').textContent=it.meta||'';$('#fTrash').textContent=r.trashed?'♻ Restore':'🗑 Trash';}
function curFocus(){const l=focusList();return l[Math.min(fIdx,l.length-1)];}
function advance(){renderFocus();}
$('#focus').addEventListener('click',e=>{const sp=e.target.closest('#fstars span');if(!sp)return;const it=curFocus();if(!it)return;const v=+sp.dataset.s,cur=R[it.id]?.stars||0,nv=cur===v?0:v;save(it.id,{stars:nv});advance();});
$('#fTrash').addEventListener('click',()=>{const it=curFocus();if(!it)return;save(it.id,{trashed:!(R[it.id]?.trashed)});advance();});
$('#fPrev').addEventListener('click',()=>{fIdx--;renderFocus();});
$('#fNext').addEventListener('click',()=>{fIdx++;renderFocus();});
$('#fcomment').addEventListener('input',e=>{const id=e.target.dataset.id;if(!id)return;clearTimeout(timers[id]);timers[id]=setTimeout(()=>save(id,{comment:e.target.value}),500);});
document.addEventListener('keydown',e=>{if(view!=='focus')return;const tag=document.activeElement.tagName;if(tag==='TEXTAREA'||tag==='INPUT')return;const it=curFocus();if(!it)return;if(e.key>='0'&&e.key<='5'){const v=+e.key;save(it.id,{stars:v});if(v>0)advance();else renderFocus();}else if(e.key==='t'||e.key==='T'){save(it.id,{trashed:!(R[it.id]?.trashed)});advance();}else if(e.key==='ArrowRight'){fIdx++;renderFocus();}else if(e.key==='ArrowLeft'){fIdx--;renderFocus();}});
function setView(v){view=v;$('#vGrid').classList.toggle('active',v==='grid');$('#vFocus').classList.toggle('active',v==='focus');$('#grid').style.display=v==='grid'?'':'none';$('#focus').classList.toggle('on',v==='focus');render();}
$('#vGrid').onclick=()=>setView('grid');$('#vFocus').onclick=()=>{fIdx=0;setView('focus');};
['#filter','#catf','#sort','#search'].forEach(s=>$(s).addEventListener('input',()=>{fIdx=0;render();}));
// export / import
$('#export').onclick=()=>{const blob=new Blob([JSON.stringify(R,null,2)],{type:'application/json'});const a=el('a');a.href=URL.createObjectURL(blob);a.download='ratings.json';a.click();};
$('#import').onclick=()=>$('#file').click();
$('#file').onchange=async(e)=>{const f=e.target.files[0];if(!f)return;try{R=JSON.parse(await f.text());persist();render();updateStat();}catch(err){alert('bad json');}};
load();
</script>
</body>
</html>
